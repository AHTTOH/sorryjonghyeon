<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <title>OK학당 자동 다음차시</title>
    <style>
      :root {
        --bg: #fffaf5;
        --panel: #ffffff;
        --border: #f0d8c2;
        --accent: #f15a0c;
        --accent-soft: #ffe1cf;
        --text: #2b211b;
        --muted: #7a6557;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 320px;
        background: radial-gradient(circle at top left, #fff3e9 0%, var(--bg) 48%, #fffdfb 100%);
        color: var(--text);
        font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      }

      .wrap {
        padding: 16px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 10px 30px rgba(102, 62, 29, 0.08);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 18px;
        line-height: 1.3;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      .desc {
        color: var(--muted);
        font-size: 13px;
      }

      .section {
        margin-top: 16px;
      }

      .label {
        margin-bottom: 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .rate-button {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        padding: 10px 0;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
      }

      .rate-button:hover {
        transform: translateY(-1px);
      }

      .rate-button.active {
        border-color: var(--accent);
        background: var(--accent-soft);
        color: #9f3300;
      }

      .status {
        margin-top: 12px;
        min-height: 20px;
        font-size: 12px;
        color: var(--muted);
      }

      .tip {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>OK학당 자동 다음차시</h1>
        <p class="desc">확장 아이콘을 누른 뒤 원하는 배속 버튼을 클릭하면 현재 열린 강의 탭에 바로 적용됩니다.</p>

        <div class="section">
          <div class="label">재생 배속 선택</div>
          <div class="grid">
            <button class="rate-button" data-rate="1">1.0x</button>
            <button class="rate-button" data-rate="1.5">1.5x</button>
            <button class="rate-button" data-rate="2">2.0x</button>
            <button class="rate-button" data-rate="2.5">2.5x</button>
            <button class="rate-button" data-rate="3">3.0x</button>
            <button class="rate-button" data-rate="4">4.0x</button>
            <button class="rate-button" data-rate="5">5.0x</button>
          </div>
          <div class="status" id="status">현재 배속을 불러오는 중...</div>
          <div class="tip">사이트 UI가 2.0x로 보이더라도 실제 영상 배속은 선택한 값으로 적용될 수 있습니다. 현재 최대 지원값은 5.0x입니다.</div>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
  </html>
